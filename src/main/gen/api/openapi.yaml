      properties:
        solde:
          format: double
          type: number
        date_solde:
          format: date
          type: string
      type: object
    getTauxAssiduiteMembre_200_response:
      example:
        taux: 6.0274563
        id_membre: 0
      properties:
        id_membre:
          type: integer
