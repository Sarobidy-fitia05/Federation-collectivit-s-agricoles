          - federation
          type: string
        entite_id:
          type: integer
        solde_initial:
          example: 0.0
          format: double
          type: number
      required:
      - entite_id
      - entite_type
      - solde_initial
      type: object
    getSoldeCompte_200_response:
      example:
        date_solde: 2000-01-23
