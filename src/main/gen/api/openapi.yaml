openapi: 3.0.3
info:
  description: |
    API pour la gestion des collectivités agricoles, des membres, des mandats, des cotisations,
    des comptes, des activités, de l'assiduité et des statistiques.
    Conforme au sujet PROG3 - Implémentation d'API REST.
    Mis à jour le 21 avril 2026 : nouvelles conditions d'admission (B-2) et statistiques fédération (H).
  title: API Fédération de collectivités agricoles
  version: 2.0.0
servers:
- description: Serveur de production
  url: https://api.federation-agricole.mg/v1
tags:
- name: Collectivités
- name: Membres
- name: Adhésion et parrainage
- name: Mandats
- name: Cotisations
- name: Comptes et trésorerie
- name: Activités
- name: Présence et assiduité
- name: Statistiques
paths:
  /collectivites:
    post:
      description: |
        Crée une collectivité si les conditions sont remplies :
        - Au moins 10 membres inscrits (dont 5 avec antériorité ≥ 6 mois)
        - Postes spécifiques occupés
        - Autorisation de la fédération (à obtenir via un endpoint dédié)
      operationId: createCollectivite
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/createCollectivite_request'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectiviteResponse'
          description: Collectivité créée (autorisation en attente)
        "400":
          description: Conditions non remplies (message d'erreur détaillé)
        "403":
          description: Autorisation de la fédération refusée
        "409":
          description: Numéro unique ou nom déjà utilisé
      summary: Créer une nouvelle collectivité (sous conditions)
      tags:
      - Collectivités
      x-content-type: application/json
      x-accepts:
      - application/json
  /collectivites/{id_collectivite}/autorisation:
    put:
      operationId: autoriserCollectivite
      parameters:
      - explode: false
        in: path
        name: id_collectivite
        required: true
        schema:
          type: integer
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/autoriserCollectivite_request'
        required: true
      responses:
        "200":
          description: Autorisation mise à jour
        "404":
          description: Collectivité non trouvée
      summary: Accorder l'autorisation d'ouverture (fédération)
      tags:
      - Collectivités
      x-content-type: application/json
      x-accepts:
      - application/json
  /membres:
    post:
      description: |
        Crée un nouveau membre et l'inscrit dans une collectivité.
        Nouvelles conditions (B-2) en vigueur depuis le 21/04/2026 :
        - Être parrainé par **au moins deux membres confirmés** de la fédération.
        - Le nombre de parrains issus de la collectivité cible doit être **≥** au nombre
          de parrains provenant d'autres collectivités.
          - Ex. valide   : 2 parrains de la coll. cible + 0 externe ✔
          - Ex. valide   : 1 parrain de la coll. cible + 1 d'une autre ✔
          - Ex. valide   : 3 parrains coll. cible + 2 externes ✔
          - Ex. refusé   : 0 parrain coll. cible + 2 externes ✗
        - Fournir ses informations personnelles + la **nature de la relation** avec chaque parrain
          (famille, amis, collègues, etc.).
        - Régler les **frais d'adhésion (50 000 MGA)** + l'intégralité des
          **cotisations annuelles obligatoires** imposées par la collectivité cible.
      operationId: adhererMembre
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/adhererMembre_request'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MembreResponse'
          description: Membre créé et adhésion enregistrée
        "400":
          description: |
            Conditions non remplies. Exemples de causes :
            - Moins de deux parrains fournis
            - Règle de majorité des parrains non respectée
            - Un parrain n'est pas membre confirmé ou son ancienneté est ≤ 90 jours
            - Informations personnelles incomplètes
        "402":
          description: Paiement des frais d'adhésion ou des cotisations annuelles
            requis
        "404":
          description: Collectivité ou parrain introuvable
      summary: Adhérer à une collectivité (nouveau membre) — conditions mises à jour
        B-2
      tags:
      - Membres
      - Adhésion et parrainage
      x-content-type: application/json
      x-accepts:
      - application/json
  /membres/{id_membre}/changer-collectivite:
    put:
      operationId: changerCollectivite
      parameters:
      - explode: false
        in: path
        name: id_membre
        required: true
        schema:
          type: integer
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/changerCollectivite_request'
        required: true
      responses:
        "200":
          description: Collectivité mise à jour
        "400":
          description: Conditions de changement non remplies
        "404":
          description: Membre ou collectivité introuvable
      summary: Changer de collectivité
      tags:
      - Membres
      - Adhésion et parrainage
      x-content-type: application/json
      x-accepts:
      - application/json
  /membres/{id_membre}/demission:
    post:
      operationId: demissionner
      parameters:
      - explode: false
        in: path
        name: id_membre
        required: true
        schema:
          type: integer
        style: simple
      responses:
        "200":
          description: Démission enregistrée (membre n'a plus de collectivité active)
        "404":
          description: Membre introuvable
      summary: Démissionner de la collectivité actuelle
      tags:
      - Membres
      - Adhésion et parrainage
      x-accepts:
      - application/json
  /mandats:
    post:
      operationId: creerMandat
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MandatInput'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Mandat'
          description: Mandat créé
        "400":
          description: |
            Conditions non remplies. Exemples :
            - Poste déjà occupé sur ce mandat
            - Membre ayant déjà atteint 2 mandats sur ce poste
            - Poste de président de fédération réservé aux anciens/actuels présidents de collectivité
        "404":
          description: Membre ou entité introuvable
        "409":
          description: Conflit de mandat (période ou poste déjà attribué)
      summary: Créer un mandat (affecter un membre à un poste pour une période)
      tags:
      - Mandats
      x-content-type: application/json
      x-accepts:
      - application/json
  /collectivites/{id_collectivite}/mandats:
    get:
      operationId: listerMandatsCollectivite
      parameters:
      - explode: false
        in: path
        name: id_collectivite
        required: true
        schema:
          type: integer
        style: simple
      - explode: true
        in: query
        name: annee
        required: false
        schema:
          example: 2026
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/Mandat'
                type: array
          description: Liste des mandats
        "404":
          description: Collectivité introuvable
      summary: Lister les mandats d'une collectivité
      tags:
      - Mandats
      x-accepts:
      - application/json
  /federation/mandats:
    get:
      operationId: listerMandatsFederation
      parameters:
      - explode: true
        in: query
        name: annee
        required: false
        schema:
          example: 2026
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/Mandat'
                type: array
          description: Liste des mandats de la fédération
      summary: Lister les mandats de la fédération
      tags:
      - Mandats
      x-accepts:
      - application/json
  /cotisations:
    post:
      operationId: enregistrerCotisation
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CotisationInput'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cotisation'
          description: Cotisation enregistrée
        "404":
          description: Membre ou collectivité non trouvé
      summary: Enregistrer une cotisation (encaissement)
      tags:
      - Cotisations
      x-content-type: application/json
      x-accepts:
      - application/json
  /collectivites/{id_collectivite}/cotisations:
    get:
      operationId: listerCotisationsParCollectivite
      parameters:
      - explode: false
        in: path
        name: id_collectivite
        required: true
        schema:
          type: integer
        style: simple
      - explode: true
        in: query
        name: periode
        required: false
        schema:
          enum:
          - mensuelle
          - annuelle
          - ponctuelle
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/Cotisation'
                type: array
          description: Liste des cotisations
        "404":
          description: Collectivité introuvable
      summary: Liste des cotisations d'une collectivité
      tags:
      - Cotisations
      x-accepts:
      - application/json
  /federation/reversement:
    get:
      operationId: getPourcentageReversement
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getPourcentageReversement_200_response'
          description: Pourcentage actuel
      summary: Obtenir le pourcentage de reversement des cotisations périodiques à
        la fédération
      tags:
      - Cotisations
      x-accepts:
      - application/json
  /comptes/caisse:
    post:
      operationId: creerCaisse
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/creerCaisse_request'
        required: true
      responses:
        "201":
          description: Caisse créée
        "404":
          description: Entité introuvable
        "409":
          description: Une caisse existe déjà pour cette entité
      summary: Créer un compte de type caisse (une seule par entité)
      tags:
      - Comptes et trésorerie
      x-content-type: application/json
      x-accepts:
      - application/json
  /comptes/bancaire:
    post:
      operationId: creerCompteBancaire
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompteBancaireInput'
        required: true
      responses:
        "201":
          description: Compte bancaire créé
        "404":
          description: Entité introuvable
      summary: Ajouter un compte bancaire
      tags:
      - Comptes et trésorerie
      x-content-type: application/json
      x-accepts:
      - application/json
  /comptes/mobile-money:
    post:
      operationId: creerCompteMobileMoney
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompteMobileMoneyInput'
        required: true
      responses:
        "201":
          description: Compte mobile money créé
        "404":
          description: Entité introuvable
      summary: Ajouter un compte mobile money
      tags:
      - Comptes et trésorerie
      x-content-type: application/json
      x-accepts:
      - application/json
  /comptes/{id_compte}/solde:
    get:
      operationId: getSoldeCompte
      parameters:
      - explode: false
        in: path
        name: id_compte
        required: true
        schema:
          type: integer
        style: simple
      - explode: true
        in: query
        name: date
        required: false
        schema:
          example: 2026-04-21
          format: date
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getSoldeCompte_200_response'
          description: Solde et date du solde
        "404":
          description: Compte introuvable
      summary: Consulter le solde d'un compte à une date donnée
      tags:
      - Comptes et trésorerie
      x-accepts:
      - application/json
  /activites:
    get:
      operationId: listerActivites
      parameters:
      - explode: true
        in: query
        name: entite_type
        required: false
        schema:
          enum:
          - collectivite
          - federation
          type: string
        style: form
      - explode: true
        in: query
        name: entite_id
        required: false
        schema:
          type: integer
        style: form
      - explode: true
        in: query
        name: type_activite
        required: false
        schema:
          enum:
          - AG mensuelle
          - formation juniors
          - exceptionnelle
          - fédérale
          type: string
        style: form
      - explode: true
        in: query
        name: obligatoire
        required: false
        schema:
          type: boolean
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/Activite'
                type: array
          description: Liste des activités
      summary: Lister les activités (avec filtres)
      tags:
      - Activités
      x-accepts:
      - application/json
    post:
      operationId: creerActivite
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActiviteInput'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Activite'
          description: Activité créée
        "400":
          description: Données invalides
        "404":
          description: Entité introuvable
      summary: Créer une activité (collectivité ou fédération)
      tags:
      - Activités
      x-content-type: application/json
      x-accepts:
      - application/json
  /activites/{id_activite}/presences:
    get:
      operationId: getFeuillePresence
      parameters:
      - explode: false
        in: path
        name: id_activite
        required: true
        schema:
          type: integer
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/Presence'
                type: array
          description: Liste des présences
        "404":
          description: Activité introuvable
      summary: Récupérer la feuille de présence d'une activité
      tags:
      - Présence et assiduité
      x-accepts:
      - application/json
    post:
      operationId: enregistrerPresences
      parameters:
      - explode: false
        in: path
        name: id_activite
        required: true
        schema:
          type: integer
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              items:
                $ref: '#/components/schemas/PresenceInput'
              type: array
        required: true
      responses:
        "200":
          description: Présences enregistrées
        "404":
          description: Activité introuvable
      summary: Enregistrer la présence des membres à une activité
      tags:
      - Présence et assiduité
      x-content-type: application/json
      x-accepts:
      - application/json
  /membres/{id_membre}/taux-assiduite:
    get:
      operationId: getTauxAssiduiteMembre
      parameters:
      - explode: false
        in: path
        name: id_membre
        required: true
        schema:
          type: integer
        style: simple
      - explode: true
        in: query
        name: date_debut
        required: true
        schema:
          format: date
          type: string
        style: form
      - explode: true
        in: query
        name: date_fin
        required: true
        schema:
          format: date
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getTauxAssiduiteMembre_200_response'
          description: "Taux d'assiduité (en pourcentage, membres externes exclus)"
        "404":
          description: Membre introuvable
      summary: Calculer le taux d'assiduité d'un membre sur une période
      tags:
      - Présence et assiduité
      x-accepts:
      - application/json
  /collectivites/{id_collectivite}/statistiques-mensuelles:
    get:
      operationId: getRapportMensuelCollectivite
      parameters:
      - explode: false
        in: path
        name: id_collectivite
        required: true
        schema:
          type: integer
        style: simple
      - explode: true
        in: query
        name: mois
        required: true
        schema:
          description: Premier jour du mois concerné (ex. 2026-04-01)
          example: 2026-04-01
          format: date
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getRapportMensuelCollectivite_200_response'
          description: Taux d'assiduité globale et nombre de membres actifs
        "404":
          description: Collectivité introuvable
      summary: Rapport mensuel du président à la fédération
      tags:
      - Statistiques
      x-accepts:
      - application/json
  /collectivites/{id_collectivite}/statistiques-membres:
    get:
      operationId: getStatistiquesMembreCollectivite
      parameters:
      - explode: false
        in: path
        name: id_collectivite
        required: true
        schema:
          type: integer
        style: simple
      - explode: true
        in: query
        name: date_debut
        required: true
        schema:
          format: date
          type: string
        style: form
      - explode: true
        in: query
        name: date_fin
        required: true
        schema:
          format: date
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/StatistiqueMembre'
                type: array
          description: "Liste des membres actifs avec taux assiduité, encaissements\
            \ et impayés"
        "404":
          description: Collectivité introuvable
      summary: Statistiques détaillées par membre actif
      tags:
      - Statistiques
      x-accepts:
      - application/json
  /federation/statistiques-mensuelles:
    get:
      description: |
        Rapport établi par le secrétaire de la fédération.
        Agrège pour chaque collectivité, sur le mois donné :
        - Le taux d'assiduité global
        - Le pourcentage de membres à jour dans leurs cotisations
        - Le nombre de nouveaux adhérents
      operationId: getRapportMensuelFederation
      parameters:
      - explode: true
        in: query
        name: mois
        required: true
        schema:
          description: Premier jour du mois concerné (ex. 2026-04-01)
          example: 2026-04-01
          format: date
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RapportMensuelFederation'
          description: Rapport mensuel global par collectivité
      summary: Rapport mensuel global de la fédération (toutes collectivités)
      tags:
      - Statistiques
      x-accepts:
      - application/json
  /federation/statistiques-annuelles:
    get:
      description: |
        Rapport présenté lors des assemblées générales annuelles.
        Agrège pour chaque collectivité, sur l'année civile donnée :
        - Le taux d'assiduité global
        - Le pourcentage de membres à jour dans leurs cotisations
        - Le nombre de nouveaux adhérents
      operationId: getRapportAnnuelFederation
      parameters:
      - explode: true
        in: query
        name: annee
        required: true
        schema:
          example: 2026
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RapportAnnuelFederation'
          description: Rapport annuel global par collectivité
      summary: Rapport annuel global de la fédération (toutes collectivités)
      tags:
      - Statistiques
      x-accepts:
      - application/json
  /federation/statistiques-periode:
    get:
      description: |
        Permet au secrétaire d'interroger les statistiques sur n'importe quelle période,
        par collectivité :
        - Taux d'assiduité global
        - Pourcentage de membres à jour dans leurs cotisations
        - Nombre de nouveaux adhérents
      operationId: getRapportPeriodeFederation
      parameters:
      - explode: true
        in: query
        name: date_debut
        required: true
        schema:
          format: date
          type: string
        style: form
      - explode: true
        in: query
        name: date_fin
        required: true
        schema:
          format: date
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/StatistiqueCollectivitePeriode'
                type: array
          description: Rapport par collectivité sur la période donnée
      summary: Rapport de la fédération sur une période libre
      tags:
      - Statistiques
      x-accepts:
      - application/json
components:
  schemas:
    CollectiviteResponse:
      example:
        autorisation_ouverture: true
        ville: ville
        specialite_agricole: specialite_agricole
        numero_unique: numero_unique
        nom: nom
        id_collectivite: 0
        date_creation: 2000-01-23
      properties:
        id_collectivite:
          type: integer
        numero_unique:
          type: string
        nom:
          type: string
        ville:
          type: string
        specialite_agricole:
          type: string
        date_creation:
          format: date
          type: string
        autorisation_ouverture:
          type: boolean
      type: object
    MembreInput:
      properties:
        nom:
          example: Rakoto
          type: string
        prenom:
          example: Jean
          type: string
        date_naissance:
          example: 1995-06-15
          format: date
          type: string
        genre:
          enum:
          - féminin
          - masculin
          type: string
        adresse:
          example: "Lot II A 47, Antananarivo"
          type: string
        metier:
          example: Riziculteur
          type: string
        telephone:
          example: "0341234567"
          type: string
        email:
          example: jean.rakoto@email.mg
          format: email
          type: string
        date_adhesion:
          example: 2026-04-21
          format: date
          type: string
      required:
      - adresse
      - date_adhesion
      - date_naissance
      - email
      - genre
      - metier
      - nom
      - prenom
      - telephone
      type: object
    MembreResponse:
      allOf:
      - $ref: '#/components/schemas/MembreInput'
      - properties:
          id_membre:
            type: integer
          id_collectivite:
            type: integer
          poste:
            enum:
            - président
            - président adjoint
            - trésorier
            - secrétaire
            - membre confirmé
            - membre junior
            type: string
        type: object
      example:
        genre: féminin
        adresse: "Lot II A 47, Antananarivo"
        telephone: "0341234567"
        date_adhesion: 2026-04-21
        poste: président
        nom: Rakoto
        prenom: Jean
        id_membre: 0
        date_naissance: 1995-06-15
        email: jean.rakoto@email.mg
        metier: Riziculteur
        id_collectivite: 6
    ParrainageInput:
      properties:
        id_parrain:
          description: |
            ID du membre parrain. Doit être un membre confirmé avec ancienneté > 90 jours.
          type: integer
        id_collectivite_parrain:
          description: Collectivité d'appartenance du parrain.
          type: integer
        id_collectivite_cible:
          description: Collectivité dans laquelle le candidat postule.
          type: integer
        relation:
          description: |
            Nature de la relation entre le candidat et ce parrain.
            Exemples : famille, amis, collègues, voisins, etc.
          example: collègues
          type: string
      required:
      - id_collectivite_cible
      - id_collectivite_parrain
      - id_parrain
      - relation
      type: object
    AdhesionInput:
      properties:
        id_collectivite_cible:
          description: Collectivité dans laquelle le candidat veut adhérer.
          type: integer
        mode_paiement_frais:
          description: Mode de paiement des frais d'adhésion (50 000 MGA).
          enum:
          - mobile money
          - virement bancaire
          type: string
        mode_paiement_cotisations_annuelles:
          description: |
            Mode de paiement des cotisations annuelles obligatoires imposées
            par la collectivité cible.
          enum:
          - mobile money
          - virement bancaire
          - espèce
          type: string
        montant_cotisations_annuelles:
          description: |
            Montant total des cotisations annuelles à régler (déterminé par la collectivité).
            Champ en lecture seule, renvoyé par le serveur pour confirmation.
          example: 200000.0
          format: double
          readOnly: true
          type: number
      required:
      - id_collectivite_cible
      - mode_paiement_cotisations_annuelles
      - mode_paiement_frais
      type: object
    MandatInput:
      example:
        date_debut: 2026-01-01
        entite_id: 6
        date_fin: 2026-12-31
        poste: président
        id_membre: 0
        entite_type: collectivite
      properties:
        id_membre:
          type: integer
        poste:
          enum:
          - président
          - président adjoint
          - trésorier
          - secrétaire
          type: string
        entite_type:
          enum:
          - collectivite
          - federation
          type: string
        entite_id:
          type: integer
        date_debut:
          description: |
            Pour une collectivité : 1er janvier de l'année civile.
            Pour la fédération : 1er janvier, mandat de 2 ans.
          example: 2026-01-01
          format: date
          type: string
        date_fin:
          description: |
            Pour une collectivité : 31 décembre de l'année civile.
            Pour la fédération : 31 décembre de l'année N+1.
          example: 2026-12-31
          format: date
          type: string
      required:
      - date_debut
      - date_fin
      - entite_id
      - entite_type
      - id_membre
      - poste
      type: object
    Mandat:
      allOf:
      - $ref: '#/components/schemas/MandatInput'
      - properties:
          id_mandat:
            type: integer
          numero_mandat:
            description: Numéro de mandat du membre pour ce poste (max 2).
            type: integer
        type: object
      example:
        id_mandat: 1
        date_debut: 2026-01-01
        entite_id: 6
        date_fin: 2026-12-31
        poste: président
        id_membre: 0
        numero_mandat: 5
        entite_type: collectivite
    CotisationInput:
      example:
        date_encaissement: 2026-04-21
        mode_paiement: espèce
        type_cotisation: mensuelle
        montant: 10000.0
        id_membre: 0
        id_collectivite: 6
      properties:
        id_membre:
          type: integer
        id_collectivite:
          type: integer
        montant:
          example: 10000.0
          format: double
          type: number
        date_encaissement:
          example: 2026-04-21
          format: date
          type: string
        mode_paiement:
          enum:
          - espèce
          - virement bancaire
          - mobile money
          type: string
        type_cotisation:
          enum:
          - mensuelle
          - annuelle
          - ponctuelle
          type: string
      required:
      - date_encaissement
      - id_collectivite
      - id_membre
      - mode_paiement
      - montant
      - type_cotisation
      type: object
    Cotisation:
      allOf:
      - $ref: '#/components/schemas/CotisationInput'
      - properties:
          id_cotisation:
            type: integer
        type: object
      example:
        date_encaissement: 2026-04-21
        mode_paiement: espèce
        type_cotisation: mensuelle
        id_cotisation: 1
        montant: 10000.0
        id_membre: 0
        id_collectivite: 6
    CompteBancaireInput:
      example:
        date_solde: 2000-01-23
        numero_compte: 00001 00002 00000000001 01
        nom_banque: BRED
        titulaire: titulaire
        entite_id: 0
        solde: 6.027456183070403
        entite_type: collectivite
      properties:
        entite_type:
          enum:
          - collectivite
          - federation
          type: string
        entite_id:
          type: integer
        titulaire:
          type: string
        nom_banque:
          enum:
          - BRED
          - MCB
          - BMOI
          - BOA
          - BGFI
          - AFG
          - ACCÈS BANQUE
          - BAOBAB
          - SIPEM
          type: string
        numero_compte:
          description: 23 chiffres (5+5+11+2) — espaces acceptés
          example: 00001 00002 00000000001 01
          pattern: "^\\d{5}\\s?\\d{5}\\s?\\d{11}\\s?\\d{2}$"
          type: string
        solde:
          format: double
          type: number
        date_solde:
          format: date
          type: string
      required:
      - date_solde
      - entite_id
      - entite_type
      - nom_banque
      - numero_compte
      - solde
      - titulaire
      type: object
    CompteMobileMoneyInput:
      example:
        date_solde: 2000-01-23
        titulaire: titulaire
        service: Orange Money
        entite_id: 0
        solde: 6.027456183070403
        numero_telephone: "0341234567"
        entite_type: collectivite
      properties:
        entite_type:
          enum:
          - collectivite
          - federation
          type: string
        entite_id:
          type: integer
        titulaire:
          type: string
        service:
          enum:
          - Orange Money
          - Mvola
          - Airtel Money
          type: string
        numero_telephone:
          example: "0341234567"
          type: string
        solde:
          format: double
          type: number
        date_solde:
          format: date
          type: string
      required:
      - date_solde
      - entite_id
      - entite_type
      - numero_telephone
      - service
      - solde
      - titulaire
      type: object
    ActiviteInput:
      example:
        public_cible: uniquement juniors
        titre: AG mensuelle d'avril 2026
        obligatoire: true
        entite_id: 0
        date_heure: 2000-01-23T04:56:07.000+00:00
        entite_type: collectivite
        type_activite: AG mensuelle
      properties:
        entite_type:
          enum:
          - collectivite
          - federation
          type: string
        entite_id:
          type: integer
        titre:
          example: AG mensuelle d'avril 2026
          type: string
        type_activite:
          enum:
          - AG mensuelle
          - formation juniors
          - exceptionnelle
          - fédérale
          type: string
        date_heure:
          format: date-time
          type: string
        obligatoire:
          type: boolean
        public_cible:
          description: Optionnel. Précise si l'activité est réservée à un sous-groupe.
          example: uniquement juniors
          type: string
      required:
      - date_heure
      - entite_id
      - entite_type
      - obligatoire
      - titre
      - type_activite
      type: object
    Activite:
      allOf:
      - $ref: '#/components/schemas/ActiviteInput'
      - properties:
          id_activite:
            type: integer
        type: object
      example:
        public_cible: uniquement juniors
        id_activite: 6
        titre: AG mensuelle d'avril 2026
        obligatoire: true
        entite_id: 0
        date_heure: 2000-01-23T04:56:07.000+00:00
        entite_type: collectivite
        type_activite: AG mensuelle
    PresenceInput:
      example:
        excus: false
        present: false
        est_membre_externe: false
        id_membre: 0
        motif_absence: motif_absence
      properties:
        id_membre:
          type: integer
        present:
          default: false
          type: boolean
        excus:
          default: false
          type: boolean
        motif_absence:
          description: Renseigné si le membre est excusé.
          type: string
        est_membre_externe:
          default: false
          description: |
            Vrai si le membre appartient à une autre collectivité.
            Sa présence ne compte pas dans son taux d'assiduité.
          type: boolean
      required:
      - id_membre
      type: object
    Presence:
      allOf:
      - $ref: '#/components/schemas/PresenceInput'
      - properties:
          id_presence:
            type: integer
        type: object
      example:
        id_presence: 6
        excus: false
        present: false
        est_membre_externe: false
        id_membre: 0
        motif_absence: motif_absence
    StatistiqueMembre:
      example:
        taux_assiduite: 6.0274563
        montant_impaye: 5.962133916683182
        montant_encaissements: 1.4658129805029452
        id_membre: 0
        nom: nom
        prenom: prenom
      properties:
        id_membre:
          type: integer
        nom:
          type: string
        prenom:
          type: string
        taux_assiduite:
          description: Taux d'assiduité sur la période (membres externes exclus).
          format: float
          type: number
        montant_encaissements:
          description: Total des cotisations encaissées sur la période.
          format: double
          type: number
        montant_impaye:
          description: Montant estimé des cotisations non réglées sur la période.
          format: double
          type: number
      type: object
    StatistiqueCollectivitePeriode:
      description: Statistiques d'une collectivité sur une période donnée.
      example:
        nom_collectivite: nom_collectivite
        pourcentage_membres_a_jour_cotisations: 1.4658129
        nombre_nouveaux_adherents: 5
        taux_assiduite_global: 6.0274563
        id_collectivite: 0
      properties:
        id_collectivite:
          type: integer
        nom_collectivite:
          type: string
        taux_assiduite_global:
          description: |
            Taux d'assiduité moyen de tous les membres actifs de la collectivité
            sur la période.
          format: float
          type: number
        pourcentage_membres_a_jour_cotisations:
          description: |
            Pourcentage de membres actifs qui sont à jour dans leurs cotisations
            obligatoires sur la période.
          format: float
          type: number
        nombre_nouveaux_adherents:
          description: Nombre de nouveaux membres ayant adhéré sur la période.
          type: integer
      type: object
    RapportMensuelFederation:
      description: Rapport mensuel global de la fédération.
      example:
        collectivites:
        - nom_collectivite: nom_collectivite
          pourcentage_membres_a_jour_cotisations: 1.4658129
          nombre_nouveaux_adherents: 5
          taux_assiduite_global: 6.0274563
          id_collectivite: 0
        - nom_collectivite: nom_collectivite
          pourcentage_membres_a_jour_cotisations: 1.4658129
          nombre_nouveaux_adherents: 5
          taux_assiduite_global: 6.0274563
          id_collectivite: 0
        mois: 2026-04-01
      properties:
        mois:
          description: Premier jour du mois concerné.
          example: 2026-04-01
          format: date
          type: string
        collectivites:
          items:
            $ref: '#/components/schemas/StatistiqueCollectivitePeriode'
          type: array
      type: object
    RapportAnnuelFederation:
      description: Rapport annuel global de la fédération.
      example:
        annee: 2026
        collectivites:
        - nom_collectivite: nom_collectivite
          pourcentage_membres_a_jour_cotisations: 1.4658129
          nombre_nouveaux_adherents: 5
          taux_assiduite_global: 6.0274563
          id_collectivite: 0
        - nom_collectivite: nom_collectivite
          pourcentage_membres_a_jour_cotisations: 1.4658129
          nombre_nouveaux_adherents: 5
          taux_assiduite_global: 6.0274563
          id_collectivite: 0
      properties:
        annee:
          example: 2026
          type: integer
        collectivites:
          items:
            $ref: '#/components/schemas/StatistiqueCollectivitePeriode'
          type: array
      type: object
    createCollectivite_request:
      properties:
        numero_unique:
          example: COL-001
          type: string
        nom:
          example: Horizon Vert
          type: string
        ville:
          example: Antananarivo
          type: string
        specialite_agricole:
          example: Riziculture
          type: string
        date_creation:
          example: 2026-04-21
          format: date
          type: string
      required:
      - date_creation
      - nom
      - numero_unique
      - specialite_agricole
      - ville
      type: object
    autoriserCollectivite_request:
      properties:
        autorisation_ouverture:
          example: true
          type: boolean
      type: object
    adhererMembre_request:
      properties:
        membre:
          $ref: '#/components/schemas/MembreInput'
        parrainages:
          description: |
            Liste d'au moins deux parrains confirmés. La règle de majorité
            (parrains de la collectivité cible ≥ parrains extérieurs) est validée
            côté serveur.
          items:
            $ref: '#/components/schemas/ParrainageInput'
          minItems: 2
          type: array
        adhesion:
          $ref: '#/components/schemas/AdhesionInput'
      required:
      - adhesion
      - membre
      - parrainages
      type: object
    changerCollectivite_request:
      properties:
        nouvelle_collectivite_id:
          type: integer
      required:
      - nouvelle_collectivite_id
      type: object
    getPourcentageReversement_200_response:
      example:
        pourcentage_reversement: 10.0
      properties:
        pourcentage_reversement:
          example: 10.0
          format: float
          type: number
      type: object
    creerCaisse_request:
      properties:
        entite_type:
          enum:
